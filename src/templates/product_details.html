{% extends "base.html" %}

{% block title %}
{{ product['name'] }} - Product Details
{% endblock %}

{% block content %}

<div class="row">

    <div class="col-md-5">
        <img
                src="{{ product['image_url'] }}"
                class="img-fluid rounded shadow"
                alt="{{ product['name'] }}"
                style="object-fit: contain; max-height: 400px; width: 100%;"
                onerror="this.src='https://placehold.co/700x500?text=No+Image'"
        >
    </div>

    <div class="col-md-7">

        <h1 class="mb-3">{{ product['name'] }}</h1>

        <span class="badge bg-secondary mb-3">{{ product['category'] }}</span>

        <h3 class="text-primary mb-4">${{ "%.2f"|format(product['price']) }}</h3>

        <h5>Description</h5>
        <p>{{ product['description'] }}</p>

        <div class="mt-4 d-flex gap-2">
            <a href="/edit/{{ product['id'] }}" class="btn btn-warning">Edit Product</a>
            <a href="/" class="btn btn-secondary">Back to Catalog</a>
        </div>

    </div>

</div>

{% endblock %}
