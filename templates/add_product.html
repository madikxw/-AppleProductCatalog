{% extends "base.html" %}

{% block title %}
Add Product
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    ```
    <div class="col-lg-8">

        <div class="card shadow-sm">

            <div class="card-header">
                <h2 class="mb-0">
                    Add New Apple Product
                </h2>
            </div>

            <div class="card-body">

                <form action="/add" method="POST">

                    <div class="mb-3">
                        <label class="form-label">
                            Product Name
                        </label>

                        <input
                                type="text"
                                name="name"
                                class="form-control"
                                placeholder="Enter product name"
                                required
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Description
                        </label>

                        <textarea
                                name="description"
                                class="form-control"
                                rows="4"
                                placeholder="Enter product description"
                                required
                        ></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Price ($)
                        </label>

                        <input
                                type="number"
                                name="price"
                                class="form-control"
                                placeholder="Enter price"
                                min="0"
                                step="0.01"
                                required
                        >
                    </div>

                    <div class="mb-3">
                        <label class="form-label">
                            Category
                        </label>

                        <select
                                name="category"
                                class="form-select"
                                required
                        >
                            <option value="">Select Category</option>
                            <option value="Mac">Mac</option>
                            <option value="iPhone">iPhone</option>
                            <option value="iPad">iPad</option>
                            <option value="Watch">Watch</option>
                            <option value="Accessories">Accessories</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">
                            Image URL
                        </label>

                        <input
                                type="text"
                                name="image_url"
                                class="form-control"
                                placeholder="Enter image URL"
                                required
                        >
                    </div>

                    <div class="d-flex gap-2">

                        <button
                                type="submit"
                                class="btn btn-primary"
                        >
                            Save Product
                        </button>

                        <a
                                href="/"
                                class="btn btn-secondary"
                        >
                            Cancel
                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>
    ```

</div>

{% endblock %}
